name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/build.yml"
      - "targets.txt"
      - "targets-mixed.txt"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: pdeck
            archive_name: pdeck-${{ github.ref_name }}-macos-aarch64.tar.gz
            artifact_name: pdeck-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pdeck
            archive_name: pdeck-${{ github.ref_name }}-linux-x86_64.tar.gz
            artifact_name: pdeck-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: pdeck.exe
            archive_name: pdeck-${{ github.ref_name }}-windows-x86_64.zip
            artifact_name: pdeck-windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: pdeck.exe
            archive_name: pdeck-${{ github.ref_name }}-windows-aarch64.zip
            artifact_name: pdeck-windows-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release archive
        shell: pwsh
        run: |
          $packageDir = Join-Path "package" "pdeck"
          $distDir = "dist"
          New-Item -ItemType Directory -Force -Path $packageDir, $distDir | Out-Null

          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $packageDir
          Copy-Item "README.md" $packageDir
          Copy-Item "targets.txt" $packageDir
          Copy-Item "targets-mixed.txt" $packageDir

          if ("${{ runner.os }}" -eq "Windows") {
            Compress-Archive -Path "$packageDir/*" -DestinationPath "$distDir/${{ matrix.archive_name }}" -Force
          } else {
            chmod +x "$packageDir/${{ matrix.binary_name }}"
            tar -czf "$distDir/${{ matrix.archive_name }}" -C $packageDir .
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
